Log:
  Level: warning # Log level: none, error, warning, info, debug 
  AccessPath: # /etc/XrayR/access.Log
  ErrorPath: # /etc/XrayR/error.log
DnsConfigPath: # /etc/XrayR/dns.json # Path to dns config, check https://xtls.github.io/config/dns.html for help
RouteConfigPath: # /etc/XrayR/route.json # Path to route config, check https://xtls.github.io/config/routing.html for help
InboundConfigPath: # /etc/XrayR/custom_inbound.json # Path to custom inbound config, check https://xtls.github.io/config/inbound.html for help
OutboundConfigPath: # /etc/XrayR/custom_outbound.json # Path to custom outbound config, check https://xtls.github.io/config/outbound.html for help
ConnectionConfig:
  Handshake: 4 # Handshake time limit, Second
  ConnIdle: 30 # Connection idle time limit, Second
  UplinkOnly: 2 # Time limit when the connection downstream is closed, Second
  DownlinkOnly: 4 # Time limit when the connection is closed after the uplink is closed, Second
  BufferSize: 64 # The internal cache size of each connection, kB
Nodes:
  -
    PanelType: "SSpanel" # Panel type: SSpanel, V2board, NewV2board, PMpanel, Proxypanel, V2RaySocks
    ApiConfig:
      ApiHost: "http://127.0.0.1:667"
      ApiKey: "123"
      NodeID: 41
      NodeType: V2ray # Node type: V2ray, Vmess, Vless, Shadowsocks, Trojan, Shadowsocks-Plugin
      Timeout: 30 # Timeout for the api request
      EnableVless: false # Enable Vless for V2ray Type
      SpeedLimit: 0 # Mbps, Local settings will replace remote settings, 0 means disable
      DeviceLimit: 0 # Local settings will replace remote settings, 0 means disable
      RuleListPath: # /etc/XrayR/rulelist Path to local rulelist file
    ControllerConfig:
      ListenIP: 0.0.0.0 # IP address you want to listen
      SendIP: 0.0.0.0 # IP address you want to send package
      UpdatePeriodic: 60 # Time to update the nodeinfo, how many sec.
      EnableDNS: false # Use custom DNS config, Please ensure that you set the dns.json well
      DNSType: AsIs # AsIs, UseIP, UseIPv4, UseIPv6, DNS strategy
      EnableProxyProtocol: false # Only works for WebSocket and TCP
      DisableSniffing: false # Disable destination sniffing; recommend true on QUIC/Hysteria2
      DisableIVCheck: false # Disable Shadowsocks IV replay check
      DisableUploadTraffic: false # Stop reporting traffic stats to panel (debug only)
      DisableGetRule: false # Stop fetching audit rule list from panel
      AutoSpeedLimitConfig:
        Limit: 0 # Warned speed. Set to 0 to disable AutoSpeedLimit (mbps)
        WarnTimes: 0 # After (WarnTimes) consecutive warnings, the user will be limited. Set to 0 to punish overspeed user immediately.
        LimitSpeed: 0 # The speedlimit of a limited user (unit: mbps)
        LimitDuration: 0 # How many minutes will the limiting last (unit: minute)
      GlobalDeviceLimitConfig:
        Enable: false # Enable the global device limit of a user
        RedisAddr: 127.0.0.1:6379 # The redis server address
        RedisPassword: YOUR PASSWORD # Redis password
        RedisDB: 0 # Redis DB
        Timeout: 5 # Timeout for redis request
        Expiry: 60 # Expiry time (second)
      EnableFallback: false # Only support for Trojan and Vless
      FallBackConfigs:  # Support multiple fallbacks
        -
          SNI: # TLS SNI(Server Name Indication), Empty for any
          Alpn: # Alpn, Empty for any
          Path: # HTTP PATH, Empty for any
          Dest: 80 # Required, Destination of fallback, check https://xtls.github.io/config/features/fallback.html for details.
          ProxyProtocolVer: 0 # Send PROXY protocol version, 0 for disable
      DisableLocalREALITYConfig: false # If true, ignore REALITYConfigs below and only trust panel-pushed REALITY config
      EnableREALITY: false # Enable REALITY TLS-on-TCP disguise (V2ray/Vless + TCP only)
      REALITYConfigs: # Used when EnableREALITY is true; see https://github.com/XTLS/REALITY
        Show: false # Print REALITY handshake debug info
        Dest: www.example.com:443 # Real upstream REALITY impersonates on handshake
        ProxyProtocolVer: 0 # 0 to disable
        ServerNames:
          - www.example.com # Accepted SNI list; client SNI must match one entry
        PrivateKey: # Generate via `xray x25519`; share the matching PublicKey to clients
        MinClientVer: # Minimum Xray client version; empty = no limit
        MaxClientVer: # Maximum Xray client version; empty = no limit
        MaxTimeDiff: 0 # Allowed clock skew in ms; 0 disables the check
        ShortIds:
          - "" # Empty = any; add hex strings (0-16 chars, even length) for multi-tenant
          - 0123456789abcdef
      CertConfig:
        CertMode: dns # Option about how to get certificate: none, file, http, tls, dns. Choose "none" will forcedly disable the tls config.
        CertDomain: "node1.test.com" # Domain to cert
        CertFile: /etc/XrayR/cert/node1.test.com.cert # Provided if the CertMode is file
        KeyFile: /etc/XrayR/cert/node1.test.com.key
        Provider: alidns # DNS cert provider, Get the full support list here: https://go-acme.github.io/lego/dns/
        Email: test@me.com
        DNSEnv: # DNS ENV option used by DNS provider
          ALICLOUD_ACCESS_KEY: aaa
          ALICLOUD_SECRET_KEY: bbb
  # -
  #   PanelType: "NewV2board" # Panel type: SSpanel, V2board, NewV2board, PMpanel, Proxypanel, V2RaySocks
  #   ApiConfig:
  #     ApiHost: "http://127.0.0.1:668"
  #     ApiKey: "123"
  #     NodeID: 4
  #     NodeType: Shadowsocks # Node type: V2ray, Shadowsocks, Trojan
  #     Timeout: 30 # Timeout for the api request
  #     EnableVless: false # Enable Vless for V2ray Type
  #     EnableXTLS: false # Enable XTLS for V2ray and Trojan
  #     SpeedLimit: 0 # Mbps, Local settings will replace remote settings
  #     DeviceLimit: 0 # Local settings will replace remote settings
  #   ControllerConfig:
  #     ListenIP: 0.0.0.0 # IP address you want to listen
  #     UpdatePeriodic: 10 # Time to update the nodeinfo, how many sec.
  #     EnableDNS: false # Use custom DNS config, Please ensure that you set the dns.json well
  #     CertConfig:
  #       CertMode: dns # Option about how to get certificate: none, file, http, dns
  #       CertDomain: "node1.test.com" # Domain to cert
  #       CertFile: /etc/XrayR/cert/node1.test.com.cert # Provided if the CertMode is file
  #       KeyFile: /etc/XrayR/cert/node1.test.com.pem
  #       Provider: alidns # DNS cert provider, Get the full support list here: https://go-acme.github.io/lego/dns/
  #       Email: test@me.com
  #       DNSEnv: # DNS ENV option used by DNS provider
  #         ALICLOUD_ACCESS_KEY: aaa
  #         ALICLOUD_SECRET_KEY: bbb
  # -
  #   # ============================================================
  #   # Hysteria 2 节点示例（QUIC-over-UDP）
  #   # ============================================================
  #   # 部署前 checklist：
  #   #   1. 防火墙/安全组放行该节点端口的 UDP 流量（Hy2 不走 TCP）。
  #   #   2. CertConfig.CertMode 必须是 file / http / dns。
  #   #      设为 none 会被启动时拒绝 —— 见 service/controller/controller.go:104。
  #   #   3. ApiHost 建议走 HTTPS：Hy2 的 panel custom_config 会携带
  #   #      obfs_password 等敏感字段，HTTP 回源会让中间链路看到。
  #   #
  #   # Hy2 专属协议参数 **不在本文件里**，由 panel 侧的 custom_config 注入。
  #   # SSPanel-UIM 节点 custom_config 参考：
  #   #   {
  #   #     "offset_port_node": 443,
  #   #     "offset_port_user": 443,
  #   #     "host": "hy2.example.com",
  #   #     "allow_insecure": false,
  #   #     "up_mbps": 500,
  #   #     "down_mbps": 1000,
  #   #     "obfs": "salamander",
  #   #     "obfs_password": "node_secret",
  #   #     "masquerade": { "type": "url", "url": "https://example.com/",
  #   #                     "rewrite_host": true, "insecure": false }
  #   #   }
  #   # 注意 allow_insecure / allowInsecure 字段上游计划 2026-06-01 硬移除；
  #   # 生产环境把 TLS 证书配对，不要依赖它。
  #   #
  #   # 以下特性对 Hy2 不生效，故此处省略：
  #   #   - EnableFallback / FallBackConfigs（TCP/WS 回落，Hy2 无概念）
  #   #   - EnableREALITY / REALITYConfigs（REALITY 是 TLS-on-TCP 伪装）
  #   # 关于限速：Hy2 的每用户带宽目前走 panel custom_config 的 up_mbps /
  #   # down_mbps（Xray-core BrutalUp/BrutalDown）。XrayR 侧的 WrapLink
  #   # 桥接对 Hy2 是否生效仍在 spike 验证中（见 XrayR 侧
  #   # hysteria2-revised-requirements 议题 2）。下面两段限速/限设备配置
  #   # 会被 controller 正常读入并注入 inbound limiter，但对 Hy2 的实测
  #   # 效果以 spike 结论为准。
  #   # ------------------------------------------------------------
  #   PanelType: "SSpanel"
  #   ApiConfig:
  #     ApiHost: "https://panel.example.com"   # 见 checklist 第 3 条
  #     ApiKey: "CHANGE_ME"
  #     NodeID: 42
  #     NodeType: Hysteria2                    # 必须精确匹配字符串 Hysteria2
  #     Timeout: 30
  #     SpeedLimit: 0                          # 本地覆盖，0=跟随面板
  #     DeviceLimit: 0
  #   ControllerConfig:
  #     ListenIP: 0.0.0.0
  #     SendIP: 0.0.0.0
  #     UpdatePeriodic: 60
  #     DisableSniffing: true                  # QUIC 内层已加密，sniff 无对象，建议关闭
  #     AutoSpeedLimitConfig:                  # 对 Hy2 的实测效果待 spike 验证（见上方说明）
  #       Limit: 0                             # 触发限速的瞬时速率 (mbps)，0=关闭
  #       WarnTimes: 0                         # 连续超速警告次数达到后执行限速，0=立即
  #       LimitSpeed: 0                        # 被限速用户的速率 (mbps)
  #       LimitDuration: 0                     # 限速持续时间 (分钟)
  #     GlobalDeviceLimitConfig:               # 共享 Redis 会话表；Hy2 下效果待 spike 验证
  #       Enable: false
  #       RedisAddr: 127.0.0.1:6379
  #       RedisPassword: YOUR_PASSWORD
  #       RedisDB: 0
  #       Timeout: 5
  #       Expiry: 60
  #     CertConfig:
  #       CertMode: dns                        # 不可为 none；Hy2 要求 TLS
  #       CertDomain: "hy2.example.com"
  #       # CertFile: /etc/XrayR/cert/hy2.example.com.cert   # CertMode=file 时填
  #       # KeyFile:  /etc/XrayR/cert/hy2.example.com.key    # CertMode=file 时填
  #       Provider: cloudflare                 # https://go-acme.github.io/lego/dns/
  #       Email: you@example.com
  #       DNSEnv:
  #         CF_API_EMAIL: you@example.com
  #         CF_API_KEY: your_api_key
